name: receipt_scanner
description: "Receipt scanner with Gemini AI auto-fill, smart filenames, and OneDrive/WhatsApp export."
publish_to: 'none'
version: 0.9.0

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # ---- UI ----
  intl: ^0.19.0                  # Date formatting

  # ---- Camera + Gemini ----
  image_picker: ^1.1.2
  google_generative_ai: ^0.4.6
  google_mlkit_text_recognition: ^0.15.1
  flutter_dotenv: ^5.1.0

  # ---- Database ----
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.4

  # ---- Export (share sheet) ----
  share_plus: ^10.1.2
  archive: ^4.0.9
  flutter_secure_storage: ^10.0.0
  pdf: ^3.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
